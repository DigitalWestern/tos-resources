name: Monthly PubMed Literature Refresh

on:
  schedule:
    # Runs at midnight UTC on the 1st of every month
    - cron: "0 0 1 * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run PubMed fetch script
        run: python scripts/pubmed_fetch.py

      - name: Commit updated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubmed_articles.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Monthly PubMed literature refresh — $(date -u +%Y-%m-%d)"
            git push
          fi
